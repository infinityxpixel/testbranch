<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Split Quest: Digital Geocache</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        :root {
            --primary: #0ea5e9;
            --success: #10b981;
            --bg: #070a13;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: white;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }

        .premium-lock {
            position: relative;
            overflow: hidden;
        }

        .premium-lock::after {
            content: "PREMIUM";
            position: absolute;
            top: 10px;
            right: -25px;
            background: #f59e0b;
            color: black;
            font-size: 10px;
            font-weight: 900;
            padding: 2px 30px;
            transform: rotate(45deg);
        }

        .pulse-active {
            animation: pulse-ring 2s infinite;
            box-shadow: 0 0 0 0 rgba(14, 165, 233, 0.4);
        }

        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(14, 165, 233, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(14, 165, 233, 0); }
            100% { box-shadow: 0 0 0 0 rgba(14, 165, 233, 0); }
        }

        .btn-gradient {
            background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%);
        }

        .modal-enter { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen pb-10">

    <!-- Navbar -->
    <nav class="p-6 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-black text-white tracking-tighter italic">SPLIT QUEST</h1>
            <div id="gps-status" class="text-[10px] text-slate-500 font-mono">GPS: DISCONNECTED</div>
        </div>
        <div id="pay-status-badge" class="px-3 py-1 rounded-full text-[10px] font-bold border border-slate-700 text-slate-400">
            FREE VERSION
        </div>
    </nav>

    <!-- Main View -->
    <main class="px-5 space-y-6">
        
        <!-- Active Tracker -->
        <section id="tracker-box" class="glass-card p-6 border-sky-500/20 border">
            <h2 id="target-name" class="text-xl font-bold text-sky-400">Select a Location</h2>
            <p id="target-hint" class="text-slate-400 text-sm mt-1">First mission (Peristil) is free to play!</p>
            
            <div id="meter-ui" class="mt-6 hidden">
                <div class="flex justify-between items-end mb-2">
                    <span class="text-3xl font-mono font-black text-white" id="dist-val">---m</span>
                    <span class="text-xs text-slate-500 mb-1">PROXIMITY</span>
                </div>
                <div class="w-full h-3 bg-slate-800 rounded-full overflow-hidden">
                    <div id="dist-bar" class="h-full bg-sky-500 transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>
        </section>

        <!-- Location List -->
        <section class="space-y-3" id="location-list">
            <!-- Locations injected here -->
        </section>

        <!-- Paywall (Hidden by default) -->
        <section id="paywall-card" class="glass-card p-8 text-center border-amber-500/30 border hidden">
            <div class="w-16 h-16 bg-amber-500/20 text-amber-500 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-8 h-8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
                </svg>
            </div>
            <h3 class="text-xl font-bold mb-2">Unlock Full Quest</h3>
            <p class="text-slate-400 text-sm mb-6">Unlock all 4 coastal locations including Bačvice and Kašjuni for only €4.99.</p>
            <!-- REPLACE THIS LINK WITH YOUR STRIPE PAYMENT LINK -->
            <a href="https://buy.stripe.com/YOUR_ACTUAL_STRIPE_LINK" class="block w-full py-4 rounded-xl btn-gradient font-bold uppercase tracking-widest text-sm shadow-lg shadow-blue-500/20">
                Unlock Everything
            </a>
        </section>
    </main>

    <!-- Modal for Content -->
    <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center p-6 hidden">
        <div class="absolute inset-0 bg-black/90" onclick="closeModal()"></div>
        <div class="glass-card w-full max-w-sm p-8 relative modal-enter">
            <div id="modal-icon" class="mb-4"></div>
            <h3 id="modal-title" class="text-2xl font-black mb-4"></h3>
            <p id="modal-body" class="text-slate-300 leading-relaxed mb-8"></p>
            <button onclick="closeModal()" class="w-full py-4 rounded-xl bg-slate-700 font-bold">CLOSE</button>
        </div>
    </div>

    <script>
        // CONFIGURATION
        const STRIPE_LINK = "https://buy.stripe.com/test_demo_link"; // Change this
        const PROXIMITY_THRESHOLD = 20; 

        const LOCATIONS = [
            { id: 'peristil', isPremium: false, name: 'Peristil', lat: 43.5083, lng: 16.4402, hint: 'Inside the Palace heart', story: 'You are standing in the Peristyle. Built 1,700 years ago, this square was designed so the Roman subjects could bow to Emperor Diocletian as he appeared in the Prothyron. The Egyptian Sphinx here was already 1,500 years old when the Romans brought it here!' },
            { id: 'bacvice', isPremium: true, name: 'Bačvice', lat: 43.5027, lng: 16.4485, hint: 'The home of Picigin', story: 'Welcome to the most famous beach in Split. The game of Picigin was born here in 1908. It is a game of zero points and maximum effort—the only goal is to keep the ball dry and make spectacular leaps into the shallow water.' },
            { id: 'jezinac', isPremium: true, name: 'Ježinac', lat: 43.5021, lng: 16.4257, hint: 'The Hidden Cove', story: 'A tranquil spot far from the crowds. This area features the Mestrovic Castilac, where Croatia\'s greatest sculptor turned a ruined estate into a temple of wooden reliefs and spiritual peace.' },
            { id: 'zvoncac', isPremium: true, name: 'Zvončac', lat: 43.5028, lng: 16.4294, hint: 'The West Coast Green', story: 'Zvončac park is the gateway to Marjan hill. During the summer, this park is the social hub for youth, offering incredible views of the yachts entering the harbor and the nearby islands.' },
            { id: 'kasjuni', isPremium: true, name: 'Kašjuni', lat: 43.5036, lng: 16.3948, hint: 'The Marjan Cliffs', story: 'One of Split\'s most photogenic beaches. Tucked directly under the steep cliffs of Marjan, it offers a dramatic Mediterranean landscape that feels worlds away from the city center.' }
        ];

        // STATE
        let isUnlocked = localStorage.getItem('quest_premium') === 'true';
        let completed = JSON.parse(localStorage.getItem('quest_done') || '[]');
        let activeId = null;
        let userCoords = null;

        // INITIALIZE
        function init() {
            // Check for Stripe success redirect
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('success') === 'true') {
                isUnlocked = true;
                localStorage.setItem('quest_premium', 'true');
                showModal("Payment Confirmed", "Welcome to the full experience! All locations are now unlocked. Happy hunting!", "🎉");
                // Clean URL
                window.history.replaceState({}, document.title, window.location.pathname);
            }

            renderUI();
            startTracking();
        }

        function renderUI() {
            const list = document.getElementById('location-list');
            const paywall = document.getElementById('paywall-card');
            const badge = document.getElementById('pay-status-badge');
            
            list.innerHTML = '';
            
            badge.innerText = isUnlocked ? "PREMIUM ACTIVE" : "FREE VERSION";
            badge.className = isUnlocked ? "px-3 py-1 rounded-full text-[10px] font-bold border border-emerald-500 text-emerald-500" : "px-3 py-1 rounded-full text-[10px] font-bold border border-slate-700 text-slate-400";

            LOCATIONS.forEach(loc => {
                const isLocked = loc.isPremium && !isUnlocked;
                const isDone = completed.includes(loc.id);
                const isActive = activeId === loc.id;

                const el = document.createElement('div');
                el.className = `glass-card p-4 flex justify-between items-center transition-all ${isLocked ? 'opacity-50 grayscale' : 'cursor-pointer'} ${isActive ? 'border-sky-500 border-2 pulse-active' : ''}`;
                
                el.onclick = () => {
                    if (isLocked) {
                        paywall.scrollIntoView({ behavior: 'smooth' });
                        paywall.classList.add('pulse-active');
                        setTimeout(() => paywall.classList.remove('pulse-active'), 2000);
                    } else if (isDone) {
                        showModal(loc.name, loc.story, "📖");
                    } else {
                        setActive(loc.id);
                    }
                };

                el.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full flex items-center justify-center ${isDone ? 'bg-emerald-500 text-black' : 'bg-slate-800 text-slate-500'}">
                            ${isDone ? '✓' : '📍'}
                        </div>
                        <div>
                            <h4 class="font-bold text-sm ${isLocked ? 'text-slate-500' : 'text-white'}">${loc.name}</h4>
                            <p class="text-[10px] text-slate-500 uppercase">${isLocked ? 'Locked' : loc.hint}</p>
                        </div>
                    </div>
                    ${isLocked ? '🔒' : ''}
                `;
                list.appendChild(el);
            });

            // Show paywall if first task is done and not unlocked
            if (completed.includes('peristil') && !isUnlocked) {
                paywall.classList.remove('hidden');
            } else {
                paywall.classList.add('hidden');
            }
        }

        function setActive(id) {
            activeId = id;
            const loc = LOCATIONS.find(l => l.id === id);
            document.getElementById('target-name').innerText = loc.name;
            document.getElementById('target-hint').innerText = "Navigate within 20m of " + loc.name;
            document.getElementById('meter-ui').classList.remove('hidden');
            renderUI();
            updateDistance();
        }

        function startTracking() {
            if (!navigator.geolocation) return;
            navigator.geolocation.watchPosition(
                (pos) => {
                    userCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    document.getElementById('gps-status').innerText = `GPS: ACCURACY ±${Math.round(pos.coords.accuracy)}M`;
                    updateDistance();
                },
                (err) => { document.getElementById('gps-status').innerText = "GPS ERROR: ENABLE PERMISSIONS"; },
                { enableHighAccuracy: true }
            );
        }

        function updateDistance() {
            if (!userCoords || !activeId) return;
            const target = LOCATIONS.find(l => l.id === activeId);
            const dist = haversine(userCoords.lat, userCoords.lng, target.lat, target.lng);
            
            document.getElementById('dist-val').innerText = `${Math.round(dist)}m`;
            
            // Progress bar (full at 200m or closer)
            const progress = Math.max(5, Math.min(100, 100 - (dist / 5)));
            document.getElementById('dist-bar').style.width = `${progress}%`;

            if (dist <= PROXIMITY_THRESHOLD) {
                completeMission(activeId);
            }
        }

        function completeMission(id) {
            if (!completed.includes(id)) {
                completed.push(id);
                localStorage.setItem('quest_done', JSON.stringify(completed));
                const loc = LOCATIONS.find(l => l.id === id);
                showModal(loc.name, loc.story, "🎉 MISSION COMPLETE");
                activeId = null;
                document.getElementById('meter-ui').classList.add('hidden');
                document.getElementById('target-name').innerText = "Mission Accomplished!";
                document.getElementById('target-hint').innerText = "Select your next destination.";
                renderUI();
            }
        }

        function haversine(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const dLat = (lat2-lat1)*Math.PI/180;
            const dLon = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function showModal(title, body, icon) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-body').innerText = body;
            document.getElementById('modal-icon').innerText = icon;
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        window.onload = init;
    </script>
</body>
</html>
