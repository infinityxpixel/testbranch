<script>
        window.onload = () => app.init();
    </script>

    <script>
    (function() {
        function configureUtterance(msg) {
            const voices = window.speechSynthesis.getVoices();
            const maleVoice = voices.find(v => v.lang.startsWith('en') && 
                (v.name.includes('Male') || v.name.includes('David') || v.name.includes('Guy'))) 
                || voices.find(v => v.lang.startsWith('en'));

            if (maleVoice) msg.voice = maleVoice;
            msg.lang = 'en-US';
            msg.rate = 0.8;  
            msg.pitch = 0.5; 
            msg.volume = 1;
        }

        function speakQuest(id) {
            window.speechSynthesis.cancel();
            const q = app.quests[id];
            const text = `Mission: ${q.title}. Location: ${q.loc}. Clue: ${q.clue}. My inquiry is: ${q.riddle}`;
            
            const msg = new SpeechSynthesisUtterance(text);
            configureUtterance(msg);
            window.speechSynthesis.speak(msg);
        }

        const checkApp = setInterval(() => {
            if (window.app && window.app.renderQuests) {
                clearInterval(checkApp);
                const originalRender = window.app.renderQuests;
                window.app.renderQuests = function() {
                    originalRender.apply(this, arguments);
                    const cards = document.querySelectorAll('.quest-card:not(.locked)');
                    cards.forEach((card, index) => {
                        if (card.querySelector('.audio-play-trigger')) return;
                        const playBtn = document.createElement('div');
                        playBtn.className = 'audio-play-trigger ml-auto p-2 text-yellow-600 hover:text-yellow-400';
                        playBtn.innerHTML = '<i class="fa-solid fa-circle-play text-2xl"></i>';
                        playBtn.onclick = (e) => {
                            e.stopPropagation();
                            speakQuest(index);
                            playBtn.classList.add('animate-pulse');
                            setTimeout(() => playBtn.classList.remove('animate-pulse'), 2000);
                        };
                        card.appendChild(playBtn);
                    });
                };
            }
        }, 100);
        window.speechSynthesis.getVoices();
    })();
    </script>
</body> </html>
